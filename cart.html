<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Somebody's Buy List — VoltEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Tangerine:wght@700&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .cart-hero{text-align:center; padding:60px 32px 0;}
  .cart-title{font-family:var(--font-script); font-size:46px; margin:0;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .cart-wrap{max-width:860px; margin:36px auto 0; padding:0 32px 100px;}
  .cart-panel{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:8px; min-height:260px;
  }
  .cart-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:18px 20px; border-bottom:1px solid var(--line); gap:16px;
  }
  .cart-row:last-child{border-bottom:none;}
  .cart-info{font-size:14px;}
  .cart-info b{font-family:var(--font-display); font-size:14px;}
  .cart-info .meta{color:var(--text-dim); font-size:12px; margin-top:4px;}
  .cart-price{font-family:var(--font-display); color:var(--mint); white-space:nowrap;}
  .cart-remove{background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:18px;}
  .cart-remove:hover{color:#ff5c5c;}
  .cart-empty{padding:60px 20px; text-align:center; color:var(--text-dim);}
  .cart-footer{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:18px; gap:16px; flex-wrap:wrap;
  }
  .cart-total{
    font-family:var(--font-display); font-size:18px; background:var(--panel);
    border:1px solid var(--line); padding:16px 26px; border-radius:8px; flex:1;
  }
  .cart-total span{color:var(--mint);}
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">VoltEdge</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="rapidtrigger.html">Why Rapid Trigger</a>
    <a href="products.html?cat=keyboard">Keyboards</a>
    <a href="products.html?cat=mouse">Mouce</a>
    <a href="products.html?cat=goods">Others</a>
  </nav>
  <div class="header-actions">
    <a href="login.html" class="icon-btn" aria-label="로그인">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </div>
</header>

<div class="cart-hero">
  <div class="eyebrow">Your Cart</div>
  <h1 class="cart-title">Somebody's Buy List</h1>
</div>

<div class="cart-wrap">
  <div class="cart-panel" id="cartPanel"></div>
  <div class="cart-footer">
    <div class="cart-total">Total : <span id="cartTotal">₩0</span></div>
    <button class="btn btn-primary" id="buyNowBtn">→ Buy Now!</button>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-brand">VoltEdge</div>
  <div class="social-links">
    <a href="#">Instagram</a><a href="#">X</a><a href="#">Twitter</a><a href="#">Facebook</a><a href="#">Youtube</a>
  </div>
  <div class="footer-copy">© 2026 VoltEdge. All rights reserved.</div>
</footer>

<script src="script.js"></script>
<script>
function render(){
  const cart = getCart();
  const panel = document.getElementById('cartPanel');
  if(cart.length === 0){
    panel.innerHTML = `<div class="cart-empty">장바구니가 비어 있어요.<br><a href="products.html?cat=keyboard" style="color:var(--mint);">제품 둘러보기 →</a></div>`;
  } else {
    panel.innerHTML = cart.map((c,n)=>`
      <div class="cart-row">
        <div class="cart-info">
          <b>${n+1}. ${c.name}</b>
          <div class="meta">Color : ${c.color} / Amount : ${c.amount}</div>
        </div>
        <div style="display:flex; align-items:center; gap:18px;">
          <span class="cart-price">₩${(c.price*c.amount).toLocaleString()}</span>
          <button class="cart-remove" data-i="${n}" aria-label="삭제">✕</button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('cartTotal').textContent = '₩' + cartTotal().toLocaleString();

  panel.querySelectorAll('.cart-remove').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      removeFromCart(+btn.dataset.i);
      render();
    });
  });
}
document.getElementById('buyNowBtn').addEventListener('click', ()=>{
  if(getCart().length===0){ alert('장바구니가 비어 있어요.'); return; }
  alert('데모 화면입니다. 실제 결제는 진행되지 않아요. 구매해 주셔서 감사합니다!');
});
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입 — VoltEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Tangerine:wght@700&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .auth-wrap{
    min-height:calc(100vh - 70px - 110px);
    display:flex; align-items:center; justify-content:center;
    padding:60px 20px; position:relative; overflow:hidden;
  }
  .auth-wrap::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 0%, rgba(127,255,221,.15), transparent 60%);
  }
  .auth-box{
    position:relative; z-index:1;
    width:100%; max-width:440px;
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:44px 36px; text-align:center;
  }
  .welcome{font-family:var(--font-script); font-size:30px; margin-bottom:30px;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .helpers{margin-top:14px; font-size:13px; color:var(--text-dim); display:flex; justify-content:center; gap:8px;}
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">VoltEdge</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="rapidtrigger.html">Why Rapid Trigger</a>
    <a href="products.html?cat=keyboard">Keyboards</a>
    <a href="products.html?cat=mouse">Mouse</a>
    <a href="products.html?cat=goods">Others</a>
  </nav>
  <div class="header-actions">
    <a href="cart.html" class="icon-btn" aria-label="장바구니">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </a>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="welcome">Welcome to the VoltEdge!</div>
    <form onsubmit="event.preventDefault(); alert('데모 화면입니다. 실제 가입은 동작하지 않아요.');">
      <input class="field" type="text" placeholder="Identification" required>
      <input class="field" type="password" placeholder="Password" required>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:22px;">Sign up</button>
      <div class="helpers">
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="checkbox" style="accent-color:#007bff;"> Remember me
        </label>
      </div>
    </form>
    <a href="login.html" class="forgot" style="display:block; margin-top:16px; font-size:13px; color:var(--text-dim);">Already Have An Account? Sign in</a>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-brand">VoltEdge</div>
  <div class="social-links">
    <a href="#">Instagram</a><a href="#">Threads</a><a href="#">X</a><a href="#">Facebook</a><a href="#">Youtube</a>
  </div>
  <div class="footer-copy">© 2026 VoltEdge. All rights reserved.</div>
</footer>

</body>
</html>
